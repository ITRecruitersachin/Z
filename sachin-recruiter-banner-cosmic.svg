<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#0E1830"/>
    </linearGradient>

    <radialGradient id="sunGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="60%" stop-color="#F5B841"/>
      <stop offset="100%" stop-color="#C97F1E"/>
    </radialGradient>
    <radialGradient id="earthGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6FC6FF"/>
      <stop offset="55%" stop-color="#2E7BD6"/>
      <stop offset="100%" stop-color="#153A73"/>
    </radialGradient>
    <radialGradient id="galaxyCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF6DE"/>
      <stop offset="45%" stop-color="#F5B841" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F5B841" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blurSoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="cardClip"><rect x="0" y="0" width="1200" height="300" rx="16"/></clipPath>
    <clipPath id="nameClip"><text x="42" y="150" font-size="46" font-weight="800">SACHIN</text></clipPath>

    <path id="orbit1" d="M 600,165 m -50,0 a 50,19 0 1,0 100,0 a 50,19 0 1,0 -100,0"/>
    <path id="orbit2" d="M 600,165 m -85,0 a 85,32 0 1,0 170,0 a 85,32 0 1,0 -170,0"/>
    <path id="orbit3" d="M 600,165 m -120,0 a 120,44 0 1,0 240,0 a 120,44 0 1,0 -240,0"/>
    <path id="orbit4" d="M 600,165 m -155,0 a 155,55 0 1,0 310,0 a 155,55 0 1,0 -310,0"/>
    <path id="moonorbit" d="M 600,165 m -130,0 a 130,46 0 1,0 260,0 a 130,46 0 1,0 -260,0"/>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="1200" height="300" fill="url(#bgGrad)"/>

    <!-- ===================== COSMIC ZOOM-OUT SCENES (crossfade loop, 24s) ===================== -->
    <g opacity="0.5">

      <!-- Scene 0: United States sourcing network -->
      <g>
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.156;0.166;1" dur="24s" repeatCount="indefinite"/>
        <path d="M300,110 L380,95 L460,90 L560,95 L650,100 L720,110 L780,130 L820,150 L840,170 L830,190 L800,210 L760,225 L700,235 L640,240 L580,238 L520,235 L460,230 L400,220 L350,205 L310,185 L290,160 L285,135 Z"
              fill="#1B3F72" fill-opacity="0.5" stroke="#4C8BF5" stroke-width="1.5" stroke-opacity="0.6"/>
        <g stroke="#4C8BF5" stroke-width="1" opacity="0.6">
          <line x1="330" y1="120" x2="620" y2="160"/>
          <line x1="620" y1="160" x2="790" y2="140"/>
          <line x1="620" y1="160" x2="620" y2="215"/>
          <line x1="330" y1="120" x2="320" y2="175"/>
        </g>
        <g fill="#4C8BF5">
          <circle cx="330" cy="120" r="4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
          <circle cx="320" cy="175" r="4"><animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/></circle>
          <circle cx="620" cy="160" r="4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
          <circle cx="790" cy="140" r="4"><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/></circle>
          <circle cx="620" cy="215" r="4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
        </g>
      </g>

      <!-- Scene 1: Earth -->
      <g>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.156;0.166;0.323;0.333;1" dur="24s" repeatCount="indefinite"/>
        <circle cx="600" cy="165" r="90" fill="none" stroke="#7FD8FF" stroke-width="2" opacity="0.35" filter="url(#glow)"/>
        <circle cx="600" cy="165" r="82" fill="url(#earthGrad)"/>
        <g clip-path="none">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0 600 165;360 600 165" dur="40s" repeatCount="indefinite"/>
            <ellipse cx="565" cy="140" rx="26" ry="16" fill="#3FAE6A" opacity="0.85"/>
            <ellipse cx="630" cy="180" rx="20" ry="13" fill="#3FAE6A" opacity="0.85"/>
            <ellipse cx="590" cy="200" rx="15" ry="9" fill="#3FAE6A" opacity="0.8"/>
          </g>
        </g>
        <circle r="4" fill="#C7D3EA">
          <animateMotion dur="9s" repeatCount="indefinite"><mpath href="#moonorbit" xlink:href="#moonorbit"/></animateMotion>
        </circle>
      </g>

      <!-- Scene 2: Solar system -->
      <g>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.323;0.333;0.49;0.5;1" dur="24s" repeatCount="indefinite"/>
        <g stroke="#3A4A6B" stroke-width="1" fill="none" opacity="0.5">
          <use href="#orbit1" xlink:href="#orbit1"/><use href="#orbit2" xlink:href="#orbit2"/><use href="#orbit3" xlink:href="#orbit3"/><use href="#orbit4" xlink:href="#orbit4"/>
        </g>
        <circle cx="600" cy="165" r="15" fill="url(#sunGrad)" filter="url(#glow)"/>
        <circle r="4" fill="#8FB4F7"><animateMotion dur="4s" repeatCount="indefinite"><mpath href="#orbit1" xlink:href="#orbit1"/></animateMotion></circle>
        <circle r="5" fill="#7EE787"><animateMotion dur="7s" repeatCount="indefinite"><mpath href="#orbit2" xlink:href="#orbit2"/></animateMotion></circle>
        <circle r="6" fill="#F2B705"><animateMotion dur="11s" repeatCount="indefinite"><mpath href="#orbit3" xlink:href="#orbit3"/></animateMotion></circle>
        <circle r="5" fill="#D2A8FF"><animateMotion dur="15s" repeatCount="indefinite"><mpath href="#orbit4" xlink:href="#orbit4"/></animateMotion></circle>
      </g>

      <!-- Scene 3: Galaxy -->
      <g>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.49;0.5;0.657;0.667;1" dur="24s" repeatCount="indefinite"/>
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0 600 165;360 600 165" dur="50s" repeatCount="indefinite"/>
          <circle cx="600" cy="165" r="34" fill="url(#galaxyCore)"/>
          <g stroke="#8FB4F7" stroke-width="1.4" fill="none" opacity="0.45">
            <path d="M600,165 q60,-40 130,-10 q40,20 20,60"/>
            <path d="M600,165 q-60,40 -130,10 q-40,-20 -20,-60"/>
          </g>
          <g fill="#C9D8FF">
            <circle cx="700" cy="140" r="2"/><circle cx="740" cy="170" r="1.6"/><circle cx="710" cy="205" r="2"/>
            <circle cx="500" cy="190" r="2"/><circle cx="465" cy="155" r="1.6"/><circle cx="495" cy="120" r="2"/>
            <circle cx="655" cy="115" r="1.6"/><circle cx="545" cy="215" r="1.6"/><circle cx="640" cy="220" r="1.4"/>
            <circle cx="555" cy="110" r="1.4"/>
          </g>
        </g>
      </g>

      <!-- Scene 4: Universe (starfield + distant galaxies) -->
      <g>
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.657;0.667;0.823;0.833;1" dur="24s" repeatCount="indefinite"/>
        <ellipse cx="420" cy="110" rx="70" ry="26" fill="#7A5CFF" opacity="0.3" filter="url(#blurSoft)"/>
        <ellipse cx="810" cy="205" rx="60" ry="22" fill="#3FD1C9" opacity="0.28" filter="url(#blurSoft)"/>
        <ellipse cx="650" cy="90" rx="45" ry="16" fill="#FF7B9C" opacity="0.22" filter="url(#blurSoft)"/>
        <g fill="#E7EEFF">
          <circle cx="300" cy="120" r="1.6"/><circle cx="340" cy="200" r="1.4"/><circle cx="390" cy="150" r="1.8"/>
          <circle cx="450" cy="230" r="1.4"/><circle cx="520" cy="100" r="1.6"/><circle cx="570" cy="170" r="1.4"/>
          <circle cx="630" cy="130" r="1.8"/><circle cx="690" cy="220" r="1.4"/><circle cx="740" cy="105" r="1.6"/>
          <circle cx="790" cy="165" r="1.4"/><circle cx="850" cy="200" r="1.8"/><circle cx="900" cy="130" r="1.4"/>
          <circle cx="880" cy="230" r="1.6"/><circle cx="360" cy="105" r="1.4"/><circle cx="480" cy="180" r="1.6"/>
          <circle cx="770" cy="230" r="1.4"/>
        </g>
        <g fill="#ffffff">
          <circle cx="390" cy="150" r="2"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
          <circle cx="630" cy="130" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
          <circle cx="850" cy="200" r="2"><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></circle>
          <circle cx="520" cy="100" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
        </g>
      </g>

      <!-- Scene 5: Multiverse -->
      <g>
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.823;0.833;1" dur="24s" repeatCount="indefinite"/>
        <g opacity="0.5">
          <circle cx="500" cy="140" r="55" fill="none" stroke="#4C8BF5" stroke-width="1.6">
            <animateTransform attributeName="transform" type="translate" values="0,0;6,4;0,0" dur="6s" repeatCount="indefinite"/>
          </circle>
          <circle cx="600" cy="180" r="65" fill="none" stroke="#8957E5" stroke-width="1.6">
            <animateTransform attributeName="transform" type="translate" values="0,0;-5,5;0,0" dur="7s" repeatCount="indefinite"/>
          </circle>
          <circle cx="700" cy="130" r="48" fill="none" stroke="#3FD1C9" stroke-width="1.6">
            <animateTransform attributeName="transform" type="translate" values="0,0;4,-5;0,0" dur="5.5s" repeatCount="indefinite"/>
          </circle>
          <circle cx="760" cy="210" r="42" fill="none" stroke="#F2B705" stroke-width="1.6">
            <animateTransform attributeName="transform" type="translate" values="0,0;-4,-4;0,0" dur="6.5s" repeatCount="indefinite"/>
          </circle>
          <circle cx="430" cy="205" r="38" fill="none" stroke="#FF7B9C" stroke-width="1.6">
            <animateTransform attributeName="transform" type="translate" values="0,0;5,3;0,0" dur="5s" repeatCount="indefinite"/>
          </circle>
        </g>
        <g fill="#C9D8FF" opacity="0.7">
          <circle cx="500" cy="140" r="1.6"/><circle cx="515" cy="150" r="1.3"/>
          <circle cx="600" cy="180" r="1.6"/><circle cx="615" cy="168" r="1.3"/>
          <circle cx="700" cy="130" r="1.6"/><circle cx="685" cy="118" r="1.3"/>
        </g>
      </g>
    </g>

    <!-- contrast overlay so foreground text stays legible -->
    <rect width="1200" height="300" fill="#0B1220" opacity="0.2"/>

    <!-- zoom caption, synced to same 24s cycle -->
    <g font-size="12.5" font-weight="700" letter-spacing="1.6" text-anchor="middle" fill="#8FA6D6">
      <text x="600" y="82"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.156;0.166;1" dur="24s" repeatCount="indefinite"/>SEARCHING · UNITED STATES</text>
      <text x="600" y="82"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.156;0.166;0.323;0.333;1" dur="24s" repeatCount="indefinite"/>SEARCHING · PLANET EARTH</text>
      <text x="600" y="82"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.323;0.333;0.49;0.5;1" dur="24s" repeatCount="indefinite"/>SEARCHING · THE SOLAR SYSTEM</text>
      <text x="600" y="82"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.49;0.5;0.657;0.667;1" dur="24s" repeatCount="indefinite"/>SEARCHING · THE GALAXY</text>
      <text x="600" y="82"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.657;0.667;0.823;0.833;1" dur="24s" repeatCount="indefinite"/>SEARCHING · THE UNIVERSE</text>
      <text x="600" y="82" fill="#F5C740"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.823;0.833;1" dur="24s" repeatCount="indefinite"/>CANDIDATE FOUND · ANY UNIVERSE ✦</text>
    </g>

    <rect width="1200" height="300" fill="none" stroke="#1E2A44" stroke-width="2"/>

    <!-- search bar -->
    <g filter="url(#glow)">
      <rect x="40" y="20" width="1120" height="42" rx="21" fill="#121B2E" stroke="#3D6BD1" stroke-width="1.4">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>
    <circle cx="66" cy="41" r="7" fill="none" stroke="#4C8BF5" stroke-width="2.2"/>
    <line x1="71" y1="46" x2="77" y2="52" stroke="#4C8BF5" stroke-width="2.2" stroke-linecap="round"/>

    <g font-family="Consolas,Menlo,'Liberation Mono',monospace" font-size="15" fill="#9FB4D8">
      <text x="92" y="46">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.30;0.34;1" dur="10s" repeatCount="indefinite"/>
        ("Java Developer" OR "Full Stack Java") AND "H1B" NOT "C2C"<tspan fill="#4C8BF5"><animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>|</tspan>
      </text>
      <text x="92" y="46" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.30;0.34;0.63;0.67;1" dur="10s" repeatCount="indefinite"/>
        ("Data Engineer" OR "ETL Developer") AND "Snowflake" AND "USC/GC"<tspan fill="#4C8BF5"><animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>|</tspan>
      </text>
      <text x="92" y="46" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.67;0.71;0.99;1" dur="10s" repeatCount="indefinite"/>
        site:linkedin.com/in "DevOps Engineer" "Open to Work"<tspan fill="#4C8BF5"><animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>|</tspan>
      </text>
    </g>

    <rect x="1082" y="30" width="60" height="22" rx="11" fill="#152341" stroke="#4C8BF5" stroke-width="1"/>
    <text x="1112" y="45" font-size="11" font-weight="bold" fill="#8FB4F7" text-anchor="middle" letter-spacing="0.5">SOURCE</text>

    <!-- vertical divider -->
    <line x1="660" y1="94" x2="660" y2="284" stroke="#1E2A44" stroke-width="1"/>

    <!-- left: identity -->
    <text x="42" y="152" font-size="44" font-weight="800" fill="#F1F5FB" letter-spacing="0.5">SACHIN</text>
    <g clip-path="url(#nameClip)">
      <rect y="102" width="120" height="60" fill="url(#shimmer)">
        <animate attributeName="x" values="-160;340;340" keyTimes="0;0.55;1" dur="5.5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <text x="43" y="180" font-size="18" font-weight="600" fill="#4C8BF5" letter-spacing="1.5">US IT RECRUITER</text>
    <text x="43" y="205" font-size="13.5" fill="#8792A6">IT Recruiting  •  Full-Cycle Sourcing  •  H1B / GC / USC</text>

    <g transform="translate(43,224)">
      <rect width="176" height="32" rx="16" fill="#241D0C" stroke="#F2B705" stroke-width="1.3"/>
      <circle cx="19" cy="16" r="9" fill="none" stroke="#F2B705" stroke-width="1.3">
        <animate attributeName="r" values="6;15;6" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0;0.6" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="19" cy="16" r="5.5" fill="#F2B705">
        <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="35" y="21" font-size="13.5" font-weight="bold" fill="#F5C740" letter-spacing="0.5">OPEN TO WORK</text>
    </g>

    <text x="43" y="278" font-size="11.5" fill="#4C4F5E" font-style="italic">searching every universe for your next hire</text>

    <!-- right: active pipeline -->
    <text x="690" y="112" font-size="13" font-weight="bold" fill="#6C7A94" letter-spacing="1.5">ACTIVE PIPELINE</text>

    <line x1="722" y1="146" x2="1132" y2="146" stroke="#233150" stroke-width="2"/>
    <line x1="722" y1="146" x2="1132" y2="146" stroke="#4C8BF5" stroke-width="2" stroke-dasharray="6 10" opacity="0.8">
      <animate attributeName="stroke-dashoffset" values="0;-32" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <circle r="5" fill="#4C8BF5" filter="url(#glow)">
      <animate attributeName="cx" values="722;1132;722" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="146" dur="4s" repeatCount="indefinite"/>
    </circle>

    <g font-size="12.5" font-weight="700" text-anchor="middle">
      <g transform="translate(722,130)">
        <circle r="16" fill="#152341" stroke="#3A4A6B" stroke-width="1.5"/>
        <text y="4" fill="#C7D3EA">120</text>
        <text y="30" font-size="11" font-weight="600" fill="#6C7A94" letter-spacing="0.3">SOURCED</text>
      </g>
      <g transform="translate(824,130)">
        <circle r="16" fill="#152341" stroke="#3A4A6B" stroke-width="1.5"/>
        <text y="4" fill="#C7D3EA">48</text>
        <text y="30" font-size="11" font-weight="600" fill="#6C7A94" letter-spacing="0.3">SCREENED</text>
      </g>
      <g transform="translate(926,130)">
        <circle r="16" fill="#152341" stroke="#4C8BF5" stroke-width="1.5"/>
        <text y="4" fill="#C7D3EA">22</text>
        <text y="30" font-size="11" font-weight="600" fill="#6C7A94" letter-spacing="0.3">SUBMITTED</text>
      </g>
      <g transform="translate(1028,130)">
        <circle r="16" fill="#152341" stroke="#4C8BF5" stroke-width="1.5"/>
        <text y="4" fill="#C7D3EA">9</text>
        <text y="30" font-size="11" font-weight="600" fill="#6C7A94" letter-spacing="0.3">INTERVIEW</text>
      </g>
      <g transform="translate(1130,130)">
        <circle r="16" fill="#0E2A1E" stroke="#34D399" stroke-width="1.5"/>
        <text y="4" fill="#7EF0BF">3</text>
        <text y="30" font-size="11" font-weight="600" fill="#34D399" letter-spacing="0.3">OFFER</text>
      </g>
    </g>

    <text x="690" y="182" font-size="10.5" fill="#5C6B87" letter-spacing="0.3">CONVERSION</text>
    <rect x="770" y="175" width="362" height="6" rx="3" fill="#152341"/>
    <rect x="770" y="175" height="6" rx="3" fill="#34D399">
      <animate attributeName="width" values="0;65;65;0" keyTimes="0;0.4;0.85;1" dur="6s" repeatCount="indefinite"/>
    </rect>

    <line x1="690" y1="200" x2="1160" y2="200" stroke="#1E2A44" stroke-width="1"/>

    <text x="690" y="222" font-size="13" font-weight="bold" fill="#6C7A94" letter-spacing="1.5">CONNECT</text>

    <g font-size="14" fill="#C7D3EA">
      <text x="690" y="245">✉  <tspan fill="#4C8BF5">Writeforsachin@gmail.com</tspan></text>
      <text x="690" y="266">↗  <tspan fill="#4C8BF5">linkedin.com/in/recruitersachin</tspan></text>
      <text x="690" y="287">⌘  <tspan fill="#4C8BF5">github.com/itrecruitersachin</tspan></text>
    </g>
  </g>
</svg>
